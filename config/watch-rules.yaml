rules:
    - id: issue
      name: issue
      repositories:
        - https://github.com/coco-papiyon/korobokcle
      target: issue
      projectName: ""
      labels: []
      projectFilters: []
      titlePattern: ""
      authors: []
      assignees:
        - coco-papiyon
      reviewers: []
      excludeDraftPR: true
      provider: ""
      model: ""
      skillSet: default
      testProfile: ""
      enabled: false
    - id: PR
      name: PR
      repositories:
        - https://github.com/coco-papiyon/korobokcle
      target: pull_request
      projectName: ""
      labels: []
      projectFilters: []
      titlePattern: ""
      authors: []
      assignees: []
      reviewers: []
      excludeDraftPR: true
      provider: ""
      model: ""
      skillSet: default
      testProfile: go-default
      enabled: true
    - id: issue(project)
      name: issue(project)
      repositories:
        - https://github.com/coco-papiyon/korobokcle
      target: issue_project
      projectName: develop
      labels: []
      projectFilters:
        - field: Status
          values:
            - Todo
      titlePattern: ""
      authors: []
      assignees:
        - coco-papiyon
      reviewers: []
      excludeDraftPR: true
      provider: ""
      model: ""
      skillSet: default
      testProfile: go-default
      enabled: true
    - id: review
      name: review
      repositories:
        - https://github.com/coco-papiyon/korobokcle
      target: pull_request_review
      projectName: ""
      labels: []
      projectFilters: []
      titlePattern: ""
      authors: []
      assignees: []
      reviewers: []
      excludeDraftPR: true
      provider: ""
      model: ""
      skillSet: default
      testProfile: go-default
      enabled: true
