httpPort: 8080
pollInterval: 120
screenRefreshInterval: 5
dataDir: data
artifactsDir: artifacts
workspaceDir: .
monitoredRepositories:
    - repository: https://github.com/coco-papiyon/korobokcle
      branch: develop
      workers: 4
provider: codex
model: gpt-5.4-mini
copilotAllowTools: []
prTitleTemplate: '[#{{issue_number}}]{{issue_title}}'
branchTemplate: issue_{{issue_number}}
sqlitePath: data/korobokcle.db
shutdownTimeout: 10
