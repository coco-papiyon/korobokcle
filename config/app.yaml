httpPort: 8080
pollInterval: 2m0s
dataDir: data
artifactsDir: artifacts
workspaceDir: .
provider: copilot
model: ""
copilotAllowTools:
    - write
    - shell(git:*)
    - shell(go:*)
    - shell(gofmt:*)
    - shell(node:*)
    - shell(npm:*)
    - shell(npx:*)
    - shell(pnpm:*)
    - shell(yarn:*)
    - shell(python:*)
    - shell(py:*)
    - shell(pip:*)
    - shell(pytest:*)
    - shell(uv:*)
    - shell(cargo:*)
    - shell(rustc:*)
    - shell(java:*)
    - shell(javac:*)
    - shell(mvn:*)
    - shell(gradle:*)
    - shell(gradlew:*)
    - shell(dotnet:*)
prTitleTemplate: '[#{{issue_number}}]{{issue_title}}'
branchTemplate: issue_{{issue_number}}
providers:
    - name: copilot
      models:
        - gpt-4.1
    - name: codex
      models:
        - gpt-5.5
        - gpt-5.4
        - gpt-5.4-mini
        - gpt-5.3-codex
        - gpt-5.2
    - name: mock
      models: []
sqlitePath: data/korobokcle.db
shutdownTimeout: 10s
