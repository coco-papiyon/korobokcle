<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mock App</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: sans-serif;
        background: linear-gradient(135deg, #f6f8fc, #e7eef9);
        color: #1f2937;
      }
      main {
        padding: 32px 40px;
        border-radius: 24px;
        background: rgba(255, 255, 255, 0.9);
        box-shadow: 0 20px 60px rgba(15, 23, 42, 0.12);
        text-align: center;
      }
      h1 {
        margin: 0 0 12px;
        font-size: 2rem;
      }
      p {
        margin: 0;
        line-height: 1.8;
      }
      code {
        padding: 0.2em 0.4em;
        border-radius: 6px;
        background: #eef2ff;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Mock App</h1>
      <p>tests フォルダ配下の動作確認用アプリです。</p>
      <p>起動コマンドは <code>npm run dev</code> です。</p>
    </main>
  </body>
</html>
